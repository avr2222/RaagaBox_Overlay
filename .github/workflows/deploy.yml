name: Deploy Overlay to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - uses: actions/checkout@v4

      - name: Inject KVDB URL
        run: sed -i "s|__KVDB_URL__|${{ secrets.KVDB_URL }}|g" overlay.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          exclude_assets: '.github,scraper.py,bot.py,*.bat,requirements.txt,config.example.json'
